name: astro-storefront
region: nyc
services:
  - name: web
    source_dir: /
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: node dist/server/entry.mjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      # Explicitly bind to all interfaces so the container is reachable
      # from DigitalOcean's internal health-check and routing layers.
      - key: HOST
        value: "0.0.0.0"
      # Configure the following via the DigitalOcean App Platform dashboard
      # rather than committing them to this file:
      # - SHOPIFY_STORE_DOMAIN
      # - SHOPIFY_STOREFRONT_ACCESS_TOKEN
      # - SHOPIFY_API_VERSION
    health_check:
      # Dedicated lightweight endpoint with no external dependencies.
      http_path: /health
      # Give the small instance plenty of time to cold-start.
      timeout_seconds: 30
      period_seconds: 15
      success_threshold: 1
      failure_threshold: 5
