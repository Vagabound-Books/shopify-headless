name: astro-storefront
region: nyc
services:
  - name: web
    source_dir: /
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: node dist/server/entry.mjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 4321
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      # Configure the following via the DigitalOcean App Platform dashboard
      # rather than committing them to this file:
      # - SHOPIFY_STORE_DOMAIN
      # - SHOPIFY_STOREFRONT_ACCESS_TOKEN
      # - SHOPIFY_API_VERSION
    health_check:
      http_path: /
      timeout_seconds: 10
      period_seconds: 10
      success_threshold: 1
      failure_threshold: 3
