name: astro-storefront
region: nyc
services:
  - name: web
    source_dir: /
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    run_command: node dist/server/entry.mjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    # The PORT env var is automatically set to this value.
    # The Astro Node adapter respects process.env.PORT.
    http_port: 8080
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: production
      # Configure the following via the DigitalOcean App Platform dashboard
      # rather than committing them to this file:
      # - SHOPIFY_STORE_DOMAIN
      # - SHOPIFY_STOREFRONT_ACCESS_TOKEN
      # - SHOPIFY_API_VERSION
    health_check:
      # Use the dedicated /health endpoint instead of /
      # so the check does not depend on Shopify API availability.
      http_path: /health
      timeout_seconds: 10
      period_seconds: 10
      success_threshold: 1
      failure_threshold: 3
